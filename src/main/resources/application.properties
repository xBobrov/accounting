spring.application.name=vodokanal

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/vodokanal
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=create-drop

#spring.jpa.show-sql=true

#spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=true

spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

rabbitmq.queue.name=message_queue

service.fgis.url = https://fgis.gost.ru/fundmetrology/eapi/vri
service.fgis.params = ?verification_date=%s&mi_number=%s&mit_number=63458-16

