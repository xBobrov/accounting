<!DOCTYPE html>
<html>
<head>
    <title>Accounting Service API Документация</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://googleapis.com|Roboto:300,400,700" rel="stylesheet">
    <style>
        html, body {
          margin: 0;
          padding: 0;
          height: 100%;
          width: 100%;
        }
        #redoc-container {
          width: 100%;
          min-height: 100vh;
        }
    </style>
    <script src="https://jsdelivr.net"></script>
</head>
<body>
<div id="redoc-container">Загрузка спецификации API...</div>

<script>
    window.onload = function() {
      if (typeof Redoc === 'undefined') {
        document.getElementById('redoc-container').innerHTML =
          `<div style="color: #cf222e; padding: 20px; font-family: sans-serif; font-weight: bold;">
            ❌ Ошибка: Не удалось загрузить библиотеку Redoc с внешнего сервера. Проверьте интернет-соединение.
          </div>`;
        return;
      }

      fetch('./openapi.json')
        .then(response => {
          if (!response.ok) throw new Error('Не удалось найти или загрузить файл openapi.json (Статус: ' + response.status + ')');
          return response.json();
        })
        .then(spec => {
          Redoc.init(spec, {
            scrollYOffset: 0
          }, document.getElementById('redoc-container'));
        })
        .catch(error => {
          document.getElementById('redoc-container').innerHTML =
            `<div style="color: #cf222e; padding: 20px; font-family: sans-serif; font-weight: bold;">
              ❌ Ошибка: ${error.message}
            </div>`;
        });
    };
</script>
</body>
</html>
