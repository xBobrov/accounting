<!DOCTYPE html>
<html>
<head>
    <title>Accounting Service API Документация</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://googleapis.com|Roboto:300,400,700" rel="stylesheet">
    <style>
        html, body {
          margin: 0;
          padding: 0;
          height: 100%;
          width: 100%;
        }
        #redoc-container {
          width: 100%;
          min-height: 100vh;
        }
    </style>
</head>
<body>
<div id="redoc-container">Загрузка спецификации API...</div>

<script src="https://redoc.ly"></script>
<script>
    window.addEventListener('DOMContentLoaded', () => {
      fetch('./openapi.json')
        .then(response => {
          if (!response.ok) throw new Error('Не удалось загрузить openapi.json (Статус: ' + response.status + ')');
          return response.json();
        })
        .then(spec => {
          Redoc.init(spec, {
            scrollYOffset: 0,
            hideDownloadButton: false
          }, document.getElementById('redoc-container'));
        })
        .catch(error => {
          document.getElementById('redoc-container').innerHTML =
            `<div style="color: #cf222e; padding: 20px; font-family: sans-serif; font-weight: bold;">
              ❌ Ошибка: ${error.message}
            </div>`;
        });
    });
</script>
</body>
</html>
